name: Build Android APK (Buildozer)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
            export APP_ALLOW_ROOT=1
            
            # 1. Находим ВСЕ шаблоны манифестов в системе и вшиваем конфиг
            # Мы ищем во всем корне / кроме папок системы, чтобы наверняка
            find /home/user/ -name AndroidManifest.tmpl.xml -exec sed -i 's/<application/<application android:networkSecurityConfig=\"@xml\/network_security_config\" android:usesCleartextTraffic=\"true\"/g' {} +
            
            # 2. Проверяем, применился ли патч (выведем в лог для отладки)
            echo '--- ПРОВЕРКА ПАТЧА ШАБЛОНА ---'
            find /home/user/ -name AndroidManifest.tmpl.xml -exec grep -H 'networkSecurityConfig' {} +
            echo '--- КОНЕЦ ПРОВЕРКИ ---'

            # 3. Запуск сборки с авто-ответом 'yes'
            yes y | buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
