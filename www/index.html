<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Football controller</title>
  <style>
    *, *:before, *:after {
      box-sizing: border-box;
    }
	  :root {
        /*Джойстик всегда будет занимать 70% высоты экрана, но не больше 250px */
      --size: clamp(200px, 40vw, 245px);
      --knob: calc(var(--size) * 0.3);
    }
    
    html,body{height:100%;margin:0;font-family:Inter, Roboto, Arial, sans-serif;background:#f5f7fb;}
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Запрещает любой скролл */
      position: fixed; /* Фиксирует экран от "прыжков" */
    }

    /* Корневой контейнер: отступ сверху/снизу 15px, растянут по ширине */
    .container{
      position:absolute;/*inset: 2vw;*/
      display:flex;gap:3vw;align-items:stretch;justify-content:space-between; overflow: hidden;
      flex-direction: column;
      height: 100%;
      width: 100%;
      padding: clamp(12px, 2.5vmin, 24px);
      padding-top: max(clamp(12px, 2.5vmin, 24px), env(safe-area-inset-top));
      padding-bottom: max(clamp(12px, 2.5vmin, 24px), env(safe-area-inset-bottom));
    }
    /* Левая колонка: джойстики и вертикальные кнопки между ними width:calc(var(--size) + 20px); */
    .col-left{display:flex;flex-direction:row;align-items:center;gap:5px;width: 100%;align-items: flex-end;justify-content: space-between;}
    
	.joystick-wrap{display:inline-block;}
    .joystick{
      width:var(--size);
      height:var(--size);
      position:relative;
      touch-action: none;
      -webkit-user-select:none;user-select:none;
      flex:1 0 auto;
    }

    /* подсветка при нажатии */
    .joystick.active .base{
      box-shadow:
        0 0 0 6px rgba(0,0,0,0.04),
        0 0 22px rgba(0,0,0,0.18),
        0 6px 18px rgba(15,20,30,0.04) inset;
      transition: box-shadow .15s ease;
    }
    /* индивидуальные цвета */
    .control-left .joystick.active .base{
      box-shadow:
        0 0 0 6px rgba(162, 198, 255, 0.83),
        0 0 24px rgba(142, 185, 255, 0.577),
        0 6px 18px rgba(66, 87, 129, 0.04) inset;
    }
    .control-right .joystick.active .base{
      box-shadow:
        0 0 0 6px rgba(255, 187, 139, 0.859),
        0 0 24px rgba(255, 172, 112, 0.644),
        0 6px 18px rgba(94, 121, 173, 0.04) inset;
    }

    .arrow{
    position:absolute;left:50%;transform:translateX(-50%);
    width:0;height:0;opacity:.35;pointer-events:none;
    }
    .arrow.up{
    top:10px;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:16px solid #0f1724;
    }


    .arrow.down{
    bottom:10px;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:16px solid #0f1724;
    }

    .base{position:absolute;inset:0;border-radius:50%;border:6px solid rgba(20,20,30,0.08);/*background:linear-gradient(180deg,#ffffff 0%,#eef2f7 100%);*/box-shadow:0 6px 18px rgba(15,20,30,0.04) inset}

    .knob{width:var(--knob);height:var(--knob);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:linear-gradient(180deg,#ffffff,#e6edf8);box-shadow:0 6px 14px rgba(20,30,50,0.12);display:flex;align-items:center;justify-content:center;touch-action:none}

    /* цвета */
    .control-left .base{ border-color: rgba(59,130,246,0.54); }
    .control-left .knob{ background: linear-gradient(180deg,#dbeafe,#bfdbfe); box-shadow: 0 6px 14px rgba(59,130,246,0.16);} /* синий */
    .control-right .base{ border-color: rgba(249,115,22,0.54); }
    .control-right .knob{ background: linear-gradient(180deg,#ffe8d6,#ffd2a8); box-shadow: 0 6px 14px rgba(249,115,22,0.12);} /* оранжевый */

    /* Кнопки вертикально между джойстиками (они тоже слегка повёрнуты) */
    .buttons-vertical{position: relative;display:flex;justify-content: center; flex-direction:column;gap:12px;align-items:center;height: 100%;/*width: 100%;*/}
	  
	.btn{width: clamp(45px, 6vmin, 60px);height: clamp(45px, 6vmin, 60px); /*width:48px;height:48px;*/border-radius:10px;border:0;background:#ffffff;box-shadow:0 6px 14px rgba(10,20,40,0.06);display:flex;align-items:center;justify-content:center;font-weight:600; transition: all .13s ease;}
    .btn-block{display: flex;flex-direction: row;gap: 15px;}
    /* Правая колонка: повёрнутые надписи и значения */
    .col-right{display:flex;flex-direction:row;align-items:center;gap:20px;justify-content: center;}
    .label{font-weight:600;color:#0f1724;white-space: normal;/*white-space: nowrap;*/ text-align: center;}
    .value{width: 100px;font-size:14px;color:#0b1220;background:#fff;padding:6px 10px;border-radius:8px;box-shadow:0 6px 18px rgba(20,30,50,0.06)}
    .control-left,.control-right{display: flex;flex-direction: column;justify-content: space-between;}
    body.bg-a{
      background: linear-gradient(180deg, #fdfefe 0%, #eff6ff 100%);
    }
    #btn6, #btn7{
      /*width: 160px;*/
      width: clamp(130px, 6vmin, 160px);
      line-height: 0px;
      height: clamp(40px, 6vmin, 60px);
    }
    .bl_c, .bl_com, .bl_d{white-space: nowrap;}
    span{
      text-decoration: none;
      font-weight: 400;
    }
    body.bg-b{
      background: linear-gradient(180deg, #212127 0%, #2e2d33 100%);
    }
    body.bg-b .label{
      color:#ffffff;
    }

    body.bg-b .value{
        background:#fdfdfd;
        box-shadow:0 6px 18px rgba(215, 228, 255, 0.264)
      
    }

    body.bg-a .label{
      color:#000000;
    }

    body.bg-a .value{
      background:#ffffff;
      box-shadow:0 6px 18px rgba(20,30,50,0.06)
    }

    body.bg-b .arrow{
      opacity: 1;
    }

    body.bg-a .arrow{
      opacity: .35;
    }


    body.bg-b .j-1{
      border-bottom: 16px solid #c0d8ff !important;
    }
    body.bg-a .j-1{
      border-bottom: 16px solid #17448d !important;
    }

    body.bg-b .j-3{
      border-top: 16px solid #c0d8ff !important;
    }
    body.bg-a .j-3{
      border-top: 16px solid #17448d !important;
    }

    body.bg-b .j-2{
      border-bottom: 16px solid #ffc48c !important;
    }
    body.bg-a .j-2{
        border-bottom: 16px solid #e67208 !important;
    }

    body.bg-b .j-4{
      border-top: 16px solid #ffc48c !important;
    }
    body.bg-a .j-4{
        border-top: 16px solid #e67208 !important;
    }

	body.bg-b .j-6{
      border-bottom: 16px solid #ffc48c !important;
    }
    body.bg-a .j-6{
        border-bottom: 16px solid #e67208 !important;
    }

    body.bg-b .j-8{
      border-top: 16px solid #ffc48c !important;
    }
    body.bg-a .j-8{
        border-top: 16px solid #e67208 !important;
    }
	  
    body.bg-b .btn:active{
      background:#f1f1f1;
      transition: all .13s ease;
      box-shadow:0 3px 20px rgba(241, 246, 255, 0.889);
    }

    body.bg-a .btn:active{
      background:#f1f1f1;
      transition: all .13s ease;
      box-shadow:0 3px 20px rgba(92, 103, 123, 0.556);
    }
    html, body {
      /* Блокирует pull-to-refresh и эффект "отскока" (bounce) */
      overscroll-behavior-y: none;
    }
    .joystick-wrap, .control-left, .container {overflow: visible !important; /* Разрешаем теням выходить за границы */}


	.control-left .joystick.C{
      touch-action: none;
      opacity: 0.5;
    }

    .control-right .joystick.A .add-controll{
      visibility: hidden;
    }


    .control-right .joystick.B .add-controll{
      visibility: visible;
      display: block;
      width: 100%;
      height: 100%;
      rotate: 90deg;
    }
    .control-right .joystick.B .j-2, .control-right .joystick.B .j-4{
      visibility: hidden;
    }

    .control-right .joystick.C .add-controll{
      visibility: visible;
      display: block;
      width: 100%;
      height: 100%;
      rotate: 90deg;
    }

    .control-right .joystick.D .add-controll{
      visibility: visible;
      display: block;
      width: 100%;
      height: 100%;
      rotate: 90deg;
    }

    #btn1.active{
      background-color: #e5ff71;
    }
    #btn2.active{
      background-color: #ffdb71;
    }
    #btn3.active{
      background-color: #ff9e71;
    }
    #btn4.active{
      background-color: #71ffb3;
    }
    #btn5.active{
      background-color: #71e3ff;
    }
    #btn9.active{
      background-color: #a6ffed;
    }
    #btn9.visible{
      visibility: visible;
      touch-action: auto;
    }
    #btn9{
      width: clamp(45px, 6vmin, 60px) !important;
      height: clamp(45px, 6vmin, 60px) !important;
      position: absolute;
      right: clamp(12px, 2.5vmin, 24px);
      top: clamp(12px, 2.5vmin, 24px);

      visibility: hidden;
      touch-action: none;
    }
  </style>
</head>

  <script>

const API_URL = "http://127.0.0.1:5000";

console.log('API URL:', API_URL);
window.currentMode = 'A';

const joystickClR = document.querySelector(".control-right .joystick-wrap .joystick");
const joystickClL = document.querySelector(".control-left .joystick-wrap .joystick");
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
const btn3 = document.getElementById('btn3');
const btn9 = document.getElementById('btn9');


btn1.onclick = () => {
    window.currentMode = 'A';
    sendLine('A\n');

    joystickClR.classList.remove('B');

    btn3.classList.remove('active');
    btn9.classList.remove('active');
    btn9.classList.remove('visible');
    resetAllJoysticks(); // Сброс в 0 при смене режима
};

btn2.onclick = () => {
    window.currentMode = 'B';
    sendLine('B\n');
    joystickClR.classList.remove('A');
    joystickClR.classList.remove('C');
    joystickClR.classList.remove('D');
    joystickClR.classList.add('B');

    joystickClL.classList.remove('C');
    joystickClL.classList.remove('D');

    btn2.classList.add('active');
    btn1.classList.remove('active');
    btn3.classList.remove('active');
    btn9.classList.remove('active');
    resetAllJoysticks();
};

btn3.onclick = () => {
    window.currentMode = 'C';
    sendLine('C\n');
    joystickClR.classList.remove('A');
    joystickClR.classList.remove('B');
    joystickClR.classList.remove('D');
    joystickClR.classList.add('C');
    joystickClL.classList.remove('A');
    joystickClL.classList.remove('D');
    joystickClL.classList.remove('B');
    joystickClL.classList.add('C');
    btn9.classList.remove('visible');

    btn3.classList.add('active');
    btn1.classList.remove('active');
    btn2.classList.remove('active');
    btn9.classList.remove('active');

    resetAllJoysticks();
};

btn9.onclick = () => {
    window.currentMode = 'D';
    btn9.classList.toggle('active');
    sendLine('D\n');

    joystickClR.classList.remove('A');
    joystickClR.classList.remove('C');
    joystickClR.classList.remove('B');
    joystickClR.classList.add('D');

    joystickClL.classList.remove('A');
    joystickClL.classList.remove('C');
    joystickClL.classList.remove('B');
    joystickClL.classList.add('D');

    if(btn9.classList.contains('active') == true){
      joystickClL.classList.add('D');
      joystickClR.classList.add('D');

      joystickClL.classList.remove('B');
      joystickClR.classList.remove('B');
    }
    else{
      joystickClL.classList.add('B');
      joystickClR.classList.add('B');

      joystickClL.classList.remove('D');
      joystickClR.classList.remove('D');
    }

    resetAllJoysticks();
};

function setJoystickLock(side, locked) {
    // Находим нужный контейнер по ID
    const id = (side === 'left' || side === 'top') ? 'joystick-top' : 'joystick-bottom';
    const container = document.getElementById(id);
    if (container) {
        if (locked) {
            container.classList.add('locked');
            // Принудительно сбрасываем в 0 при блокировке
            container.dispatchEvent(new CustomEvent('reset')); 
        } else {
            container.classList.remove('locked');
        }
    }
}

function resetAllJoysticks() {
    // Вызываем resetKnob для обоих джойстиков через их элементы
    // или просто принудительно обнуляем UI
    if (window.currentMode == 'A'){
      document.getElementById('value-bottom').textContent = 'Y: 0';
      setJoystickLock('left', false);
    }
    else if(window.currentMode == 'B'){
      document.getElementById('value-bottom').textContent = 'X: 0';
      setJoystickLock('left', false);
    }
    else if(window.currentMode == 'D'){
      document.getElementById('value-bottom').textContent = 'X:0 Y:0';
      setJoystickLock('left', false);
    }
    else if(window.currentMode == 'C'){
      document.getElementById('value-bottom').textContent = 'X:0 Y:0';
      setJoystickLock('left', true);
    }
}


// Функция переключения состояний
function updateUI(isConnected) {
    const btnConnect = document.getElementById('btn7');
    const btnDisconnect = document.getElementById('btn6');
    const actionButtons = ['btn1', 'btn2', 'btn3'];

    if (isConnected) {
        // Подключено: BT-Connect заблокирован, остальное доступно
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;
        actionButtons.forEach(id => document.getElementById(id).disabled = false);
    } else {
        // Отключено: Только BT-Connect доступен
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
        actionButtons.forEach(id => document.getElementById(id).disabled = true);
    }
}
	  
/*По умолчанию кнопки не доступны*/
updateUI(false);
	  


// Вставляем обновление статуса (вызывается из Python)
function setStatus(text) {
    const statusEl = document.querySelector('.status');
    if (statusEl) statusEl.textContent = text;
    
    // Логика авто-переключения кнопок по тексту статуса
    if (text === "Подключено") {
        updateUI(true);
    } else if (text === "Отключено" || text.includes("Ошибка") || text === "Связь потеряна") {
        updateUI(false);
    }
}

function sendLine(line) {
    // Используем Beacon API для мгновенной отправки
    // Формируем URL с параметром cmd
    const url = `${API_URL}/send?cmd=${encodeURIComponent(line)}`;
    
    // sendBeacon отправляет POST запрос в фоне. Браузер сам его протолкнет.
    navigator.sendBeacon(url);
}

    //Стики
     (function() {
      // 1. ГЛОБАЛЬНЫЙ РЕЖИМ (если еще не объявлен выше)
      if (typeof window.currentMode === 'undefined') window.currentMode = 'A';

      const joysticks = [
        { container: document.getElementById('joystick-top'), knob: document.getElementById('knob-top'), valueEl: document.getElementById('value-top') },
        { container: document.getElementById('joystick-bottom'), knob: document.getElementById('knob-bottom'), valueEl: document.getElementById('value-bottom') }
      ];

      joysticks.forEach(setupJoystick);

      function setupJoystick({ container, knob, valueEl }) {
        if (!container || !knob) return;

        let active = false;
        let pointerId = null;
        let touchId = null;

        const getParams = () => {
          const s = parseFloat(getComputedStyle(container).width);
          const ks = parseFloat(getComputedStyle(knob).width);
          return { maxOffset: s / 2 - ks / 2 };
        };

        const updateJoystick = (dx, dy, withTransition = false) => {
          // ПРОВЕРКА БЛОКИРОВКИ: если есть класс locked, выходим из функции
          if (container.classList.contains('locked')) return;
          const { maxOffset } = getParams();
          const isRight = (container.id === 'joystick-bottom');
          let finalX = 0, finalY = 0;

          // ЛОГИКА РЕЖИМОВ
          if (isRight && (window.currentMode === 'D' || window.currentMode === 'C')) {
            const dist = Math.sqrt(dx * dx + dy * dy);
            const limit = Math.min(dist, maxOffset);
            if (dist > 0) {
              finalX = dx * (limit / dist);
              finalY = dy * (limit / dist);
            }
          } else if (isRight && window.currentMode === 'B') {
            finalX = Math.max(-maxOffset, Math.min(maxOffset, dx));
          } else {
            finalY = Math.max(-maxOffset, Math.min(maxOffset, dy));
          }

          // ВИЗУАЛ
          knob.style.transition = withTransition ? 'transform .14s ease' : 'none';
          knob.style.transform = `translate(calc(-50% + ${finalX}px), calc(-50% + ${finalY}px))`;

          // ДАННЫЕ
          const nx = Math.round((finalX / maxOffset) * 100);
          const ny = Math.round((-finalY / maxOffset) * 100);
          const prefix = isRight ? 'R' : 'L';

          if (isRight && (window.currentMode === 'D' || window.currentMode === 'C')) {
            if (window.lastR !== `${nx},${ny}`) {
              sendLine(`RX${nx}RY${ny}\n`);
              window.lastR = `${nx},${ny}`;
              if (valueEl) valueEl.textContent = `X:${nx} Y:${ny}`;
            }
          } else {
            const val = (isRight && window.currentMode === 'B') ? nx : ny;
            const label = (isRight && window.currentMode === 'B') ? 'X' : 'Y';
            if (prefix === 'R') {
              if (window.lastR !== val) { sendLine(`R${val}\n`); window.lastR = val; }
            } else {
              if (window.lastL !== val) { sendLine(`L${val}\n`); window.lastL = val; }
            }
            if (valueEl) valueEl.textContent = `${label}: ${val > 0 ? '+' : ''}${val}`;
          }
        };

        const resetKnob = () => updateJoystick(0, 0, true);

        // ПОИНТЕРЫ (МЫШЬ)
        knob.addEventListener('pointerdown', (e) => {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          active = true; pointerId = e.pointerId;
          container.classList.add('active');
          knob.setPointerCapture(e.pointerId);
        });

        document.addEventListener('pointermove', (e) => {
          if (!active || e.pointerId !== pointerId) return;
          const rect = container.getBoundingClientRect();
          updateJoystick(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
        });

        document.addEventListener('pointerup', (e) => {
          if (e.pointerId !== pointerId) return;
          active = false; pointerId = null;
          container.classList.remove('active');
          resetKnob();
          sendLine((container.id === 'joystick-bottom' && (window.currentMode === 'D' || window.currentMode === 'C')) ? "RX0RY0\n" : `${container.id === 'joystick-top' ? 'L' : 'R'}0\n`);
        });

        // ТАЧ (СЕНСОР)
        knob.addEventListener('touchstart', (e) => {
          e.preventDefault();
          if (touchId !== null) return;
          const t = e.changedTouches[0];
          touchId = t.identifier; active = true;
          container.classList.add('active');
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          if (!active || touchId === null) return;
          const t = Array.from(e.touches).find(touch => touch.identifier === touchId);
          if (!t) return;
          e.preventDefault();
          const rect = container.getBoundingClientRect();
          updateJoystick(t.clientX - (rect.left + rect.width / 2), t.clientY - (rect.top + rect.height / 2));
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
          const t = Array.from(e.changedTouches).find(touch => touch.identifier === touchId);
          if (!t) return;
          active = false; touchId = null;
          container.classList.remove('active');
          resetKnob();
          sendLine((container.id === 'joystick-bottom' && (window.currentMode === 'D' || window.currentMode === 'C')) ? "RX0RY0\n" : `${container.id === 'joystick-top' ? 'L' : 'R'}0\n`);
        });

        resetKnob();
      }
    })();
    
  </script>
</body>
</html>
